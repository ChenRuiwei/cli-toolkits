name: Build Toolkit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 */3 *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download tools
        run: |
          OUT="bin"
          mkdir -p $OUT

          # ============ Versions (hardcoded, update when needed) ============
          BAT_VER="0.26.1"
          BTOP_VER="1.4.6"
          DELTA_VER="0.19.2"
          DUST_VER="1.2.4"
          EZA_VER="0.23.4"
          FD_VER="10.4.2"
          LAZYGIT_VER="0.60.0"
          LSD_VER="1.2.0"
          RIPGREP_VER="15.1.0"
          STARSHIP_VER="1.24.2"
          TEALDEER_VER="1.8.1"
          YAZI_VER="26.1.22"
          ZOXIDE_VER="0.9.8"
          TOKEI_VER="13.2.0"
          DOTTER_VER="1.1.1"
          DIRENV_VER="2.37.1"
          FISH_VER="4.6.0"
          FZF_VER="0.71.0"
          NEOVIM_VER="0.12.1"
          TMUX_VER="3.6a"
          # ================================================================

          echo "🚀 Downloading prebuilt binaries..."

          # bat (musl)
          echo "⬇️ bat..."
          curl -fsSL "https://github.com/sharkdp/bat/releases/download/v${BAT_VER}/bat-v${BAT_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/bat-$BAT_VER-x86_64-unknown-linux-musl/bat $OUT/ 2>/dev/null || mv $OUT/bat $OUT/ 2>/dev/null || true
          rm -rf $OUT/bat-*

          # btop (musl only, .tbz = tar.bz2)
          echo "⬇️ btop..."
          curl -fsSL "https://github.com/aristocratos/btop/releases/download/v${BTOP_VER}/btop-x86_64-unknown-linux-musl.tbz" | tar xj -C $OUT/
          mv $OUT/btop-$BTOP_VER-x86_64-unknown-linux-musl/btop $OUT/ 2>/dev/null || mv $OUT/btop $OUT/ 2>/dev/null || true
          rm -rf $OUT/btop-*

          # delta (musl)
          echo "⬇️ delta..."
          curl -fsSL "https://github.com/dandavison/delta/releases/download/${DELTA_VER}/delta-${DELTA_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/delta-$DELTA_VER-x86_64-unknown-linux-musl/delta $OUT/ 2>/dev/null || mv $OUT/delta $OUT/ 2>/dev/null || true
          rm -rf $OUT/delta-*

          # dust (musl)
          echo "⬇️ dust..."
          curl -fsSL "https://github.com/bootandy/dust/releases/download/v${DUST_VER}/dust-v${DUST_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/dust-$DUST_VER-x86_64-unknown-linux-musl/dust $OUT/ 2>/dev/null || mv $OUT/dust $OUT/ 2>/dev/null || true
          rm -rf $OUT/dust-*

          # eza (musl)
          echo "⬇️ eza..."
          curl -fsSL "https://github.com/eza-community/eza/releases/download/v${EZA_VER}/eza_x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/eza $OUT/ 2>/dev/null || true
          rm -rf $OUT/eza-*

          # fd (musl, binary named fd)
          echo "⬇️ fd..."
          curl -fsSL "https://github.com/sharkdp/fd/releases/download/v${FD_VER}/fd-v${FD_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/fd-$FD_VER-x86_64-unknown-linux-musl/fd $OUT/ 2>/dev/null || mv $OUT/fd $OUT/ 2>/dev/null || true
          rm -rf $OUT/fd-*

          # lazygit (linux x86_64, not musl)
          echo "⬇️ lazygit..."
          curl -fsSL "https://github.com/jesseduffield/lazygit/releases/download/v${LAZYGIT_VER}/lazygit_${LAZYGIT_VER}_linux_x86_64.tar.gz" | tar xz -C $OUT/
          mv $OUT/lazygit $OUT/ 2>/dev/null || true
          rm -rf $OUT/lazygit-*

          # lsd (musl)
          echo "⬇️ lsd..."
          curl -fsSL "https://github.com/lsd-rs/lsd/releases/download/v${LSD_VER}/lsd-v${LSD_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/lsd-$LSD_VER-x86_64-unknown-linux-musl/lsd $OUT/ 2>/dev/null || mv $OUT/lsd $OUT/ 2>/dev/null || true
          rm -rf $OUT/lsd-*

          # ripgrep (musl only, binary named rg)
          echo "⬇️ ripgrep..."
          curl -fsSL "https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VER}/ripgrep-${RIPGREP_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/ripgrep-$RIPGREP_VER-x86_64-unknown-linux-musl/rg $OUT/ 2>/dev/null || mv $OUT/rg $OUT/ 2>/dev/null || true
          rm -rf $OUT/ripgrep-*

          # starship (musl)
          echo "⬇️ starship..."
          curl -fsSL "https://github.com/starship/starship/releases/download/v${STARSHIP_VER}/starship-${STARSHIP_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/starship $OUT/ 2>/dev/null || true
          rm -rf $OUT/starship-*

          # tealdeer (raw binary, no archive!)
          echo "⬇️ tealdeer..."
          curl -fsSL "https://github.com/tealdeer-rs/tealdeer/releases/download/v${TEALDEER_VER}/tealdeer-linux-x86_64-musl" -o $OUT/tealdeer
          chmod +x $OUT/tealdeer

          # yazi (musl, zip format)
          echo "⬇️ yazi..."
          curl -fsSL "https://github.com/sxyazi/yazi/releases/download/v${YAZI_VER}/yazi-x86_64-unknown-linux-musl.zip" -o $OUT/yazi.zip
          unzip -o $OUT/yazi.zip -d $OUT/
          mv $OUT/yazi-x86_64-unknown-linux-musl/yazi $OUT/ 2>/dev/null || mv $OUT/yazi $OUT/ 2>/dev/null || true
          rm -rf $OUT/yazi-* $OUT/yazi.zip

          # zoxide (musl only, binary named zoxide)
          echo "⬇️ zoxide..."
          curl -fsSL "https://github.com/ajeetdsouza/zoxide/releases/download/v${ZOXIDE_VER}/zoxide-${ZOXIDE_VER}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/zoxide-$ZOXIDE_VER-x86_64-unknown-linux-musl/zoxide $OUT/ 2>/dev/null || mv $OUT/zoxide $OUT/ 2>/dev/null || true
          rm -rf $OUT/zoxide-*

          # tokei (musl)
          echo "⬇️ tokei..."
          curl -fsSL "https://github.com/XAMPPRocky/tokei/releases/download/v${TOKEI_VER}/tokei-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/tokei $OUT/ 2>/dev/null || true
          rm -rf $OUT/tokei-*

          # dotter (musl)
          echo "⬇️ dotter..."
          curl -fsSL "https://github.com/dotter-rs/dotter/releases/download/v${DOTTER_VER}/dotter-x86_64-unknown-linux-musl.tar.gz" | tar xz -C $OUT/
          mv $OUT/dotter $OUT/ 2>/dev/null || true
          rm -rf $OUT/dotter-*

          # direnv (raw binary)
          echo "⬇️ direnv..."
          curl -fsSL "https://github.com/direnv/direnv/releases/download/v${DIRENV_VER}/direnv.linux-amd64" -o $OUT/direnv
          chmod +x $OUT/direnv

          # fish (.tar.xz format)
          echo "⬇️ fish..."
          curl -fsSL "https://github.com/fish-shell/fish-shell/releases/download/${FISH_VER}/fish-${FISH_VER}-linux-x86_64.tar.xz" | tar xJ -C $OUT/
          mv $OUT/fish-$FISH_VER-linux-x86_64/bin/fish $OUT/ 2>/dev/null || mv $OUT/fish $OUT/ 2>/dev/null || true
          rm -rf $OUT/fish-*

          # fzf
          echo "⬇️ fzf..."
          curl -fsSL "https://github.com/junegunn/fzf/releases/download/v${FZF_VER}/fzf-${FZF_VER}-linux_amd64.tar.gz" | tar xz -C $OUT/
          chmod +x $OUT/fzf

          # neovim
          echo "⬇️ neovim..."
          curl -fsSL "https://github.com/neovim/neovim/releases/download/v${NEOVIM_VER}/nvim-linux-x86_64.tar.gz" | tar xz
          mv nvim-*/bin/nvim $OUT/
          rm -rf nvim-*

          # tmux (prebuilt from tmux-builds)
          echo "⬇️ tmux..."
          curl -fsSL "https://github.com/tmux/tmux-builds/releases/download/${TMUX_VER}/tmux-${TMUX_VER}-linux-x86_64.tar.gz" | tar xz -C $OUT/
          chmod +x $OUT/tmux

          echo ""
          echo "📦 Installed tools:"
          ls -la $OUT/

          echo ""
          echo "📦 Compressing..."
          TAR_NAME="toolkit-amd64.tar.gz"
          tar -czvf $TAR_NAME -C $OUT .

          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-amd64
          path: ${{ env.TAR_NAME }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Toolkit ${{ needs.prepare.outputs.tag_name }}
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
