name: Build Multi-Arch Toolkit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 */3 *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      - name: Add cargo to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Tools for linux/${{ matrix.arch }}
        run: |
          TARGET="${{ matrix.arch }}"
          OUT="bin"
          mkdir -p $OUT

          echo "🚀 Architecture: $TARGET"

          # Rust tools via cargo install
          echo "⬇️ bat..."
          cargo install bat --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/bat" "$OUT/"

          echo "⬇️ btop..."
          cargo install btop --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/btop" "$OUT/"

          echo "⬇️ delta..."
          cargo install git-delta --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/delta" "$OUT/"

          echo "⬇️ dust..."
          cargo install du-dust --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/dust" "$OUT/"

          echo "⬇️ eza..."
          cargo install eza --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/eza" "$OUT/"

          echo "⬇️ fd..."
          cargo install fd-find --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/fd" "$OUT/"

          echo "⬇️ lazygit..."
          cargo install lazygit --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/lazygit" "$OUT/"

          echo "⬇️ lsd..."
          cargo install lsd --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/lsd" "$OUT/"

          echo "⬇️ ripgrep..."
          cargo install ripgrep --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/rg" "$OUT/"

          echo "⬇️ starship..."
          cargo install starship --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/starship" "$OUT/"

          echo "⬇️ tealdeer..."
          cargo install tealdeer --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/tealdeer" "$OUT/"

          echo "⬇️ yazi..."
          cargo install yazi --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/yazi" "$OUT/"

          echo "⬇️ zoxide..."
          cargo install zoxide --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/zoxide" "$OUT/"

          echo "⬇️ tokei..."
          cargo install tokei --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/tokei" "$OUT/"

          echo "⬇️ dotter..."
          cargo install dotter --root "$HOME/.local" --locked
          mv "$HOME/.local/bin/dotter" "$OUT/"

          # Non-Rust tools (no cargo install available)
          echo "⬇️ direnv..."
          if [ "$TARGET" = "amd64" ]; then
            curl -fsSL "https://github.com/direnv/direnv/releases/latest/download/direnv.linux-amd64" -o "$OUT/direnv"
          else
            curl -fsSL "https://github.com/direnv/direnv/releases/latest/download/direnv.linux-arm64" -o "$OUT/direnv"
          fi
          chmod +x "$OUT/direnv"

          echo "⬇️ fish..."
          if [ "$TARGET" = "amd64" ]; then
            curl -fsSL "https://github.com/fish-shell/fish-shell/releases/latest/download/fish-3.7.0.tar.gz" | tar xz
            mv fish-*/bin/fish "$OUT/"
          else
            curl -fsSL "https://github.com/fish-shell/fish-shell/releases/latest/download/fish-3.7.0.tar.gz" | tar xz
            mv fish-*/bin/fish "$OUT/"
          fi

          echo "⬇️ fzf..."
          curl -fsSL "https://github.com/junegunn/fzf/releases/latest/download/fzf-0.53.0-linux_$TARGET.tar.gz" | tar xz -C "$OUT/"
          chmod +x "$OUT/fzf"

          echo "⬇️ neovim..."
          if [ "$TARGET" = "amd64" ]; then
            curl -fsSL "https://github.com/neovim/neovim/releases/download/v0.12.1/nvim-linux-x86_64.tar.gz" | tar xz
          else
            curl -fsSL "https://github.com/neovim/neovim/releases/download/v0.12.1/nvim-linux-arm64.tar.gz" | tar xz
          fi
          mv nvim-*/bin/nvim "$OUT/"
          rm -rf nvim-*

          echo "⬇️ tmux..."
          apt-get update && apt-get install -y libevent-dev libncurses-dev bison pkg-config
          TMUX_VER=$(curl -s https://api.github.com/repos/tmux/tmux/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -fsSL "https://github.com/tmux/tmux/releases/download/v${TMUX_VER}/tmux-${TMUX_VER}.tar.gz" | tar xz
          cd "tmux-${TMUX_VER}"
          ./configure CFLAGS="-I$HOME/.local/include" LDFLAGS="-L$HOME/.local/lib"
          make -j$(nproc)
          mv tmux "$OUT/"
          cd .. && rm -rf "tmux-${TMUX_VER}"

          echo "📦 Installed tools:"
          ls -la "$OUT/"

          echo "📦 Compressing..."
          TAR_NAME="toolkit-$TARGET.tar.gz"
          tar -czvf "$TAR_NAME" -C "$OUT" .

          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-${{ matrix.arch }}
          path: ${{ env.TAR_NAME }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Toolkit ${{ needs.prepare.outputs.tag_name }}
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
