name: Build Multi-Arch Toolkit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 */3 *' # every season on the 1st at 04:00 UTC

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "date=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install eget
        run: curl https://zyedidia.github.io/eget.sh | sh

      - name: Download Tools for linux/${{ matrix.arch }}
        run: |
          TARGET="linux/${{ matrix.arch }}"
          OUT="bin"
          mkdir -p $OUT

          echo "🚀 Architecture: $TARGET"

          echo "⬇️ bat..."
          ./eget sharkdp/bat --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "⬇️ btop..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./eget aristocratos/btop --asset "btop-*-x86_64-unknown-linux-musl.tbz" --to $OUT/
          else
            ./eget aristocratos/btop --asset "btop-*-aarch64-unknown-linux-musl.tbz" --to $OUT/
          fi

          echo "⬇️ delta..."
          ./eget dandavison/delta --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "⬇️ direnv..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./eget direnv/direnv --asset "direnv.linux-amd64" --to $OUT/
          else
            ./eget direnv/direnv --asset "direnv.linux-arm64" --to $OUT/
          fi
          chmod +x $OUT/direnv

          echo "⬇️ dust..."
          ./eget bootandy/dust --system $TARGET --asset "gnu" --asset "tar.gz" --to $OUT/

          echo "⬇️ eza..."
          ./eget eza-community/eza --system $TARGET --asset "gnu" --asset "tar.gz" --to $OUT/

          echo "⬇️ fd..."
          ./eget sharkdp/fd --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "⬇️ fish..."
          ./eget fish-shell/fish-shell --system $TARGET --to $OUT/

          echo "⬇️ fzf..."
          ./eget junegunn/fzf --system $TARGET --asset "tar.gz" --to $OUT/

          echo "⬇️ lazygit..."
          ./eget jesseduffield/lazygit --system $TARGET --to $OUT/

          echo "⬇️ lsd..."
          ./eget lsd-rs/lsd --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "⬇️ neovim..."
          ./eget neovim/neovim --system $TARGET --to $OUT/

          echo "⬇️ ripgrep..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./eget BurntSushi/ripgrep --asset "x86_64-unknown-linux-musl" --system $TARGET --to $OUT/rg
          else
            ./eget BurntSushi/ripgrep --asset "aarch64-unknown-linux-gnu" --system $TARGET --to $OUT/rg
          fi

          echo "⬇️ starship..."
          ./eget starship/starship --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "⬇️ tealdeer..."
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./eget tealdeer-rs/tealdeer --asset "tealdeer-linux-x86_64-musl" --to $OUT/
          else
            ./eget tealdeer-rs/tealdeer --asset "tealdeer-linux-aarch64-musl" --to $OUT/
          fi
          chmod +x $OUT/tealdeer

          echo "⬇️ yazi..."
          ./eget sxyazi/yazi --system $TARGET --asset "gnu" --asset "zip" --to $OUT/
          if [ -f "$OUT/yazi.zip" ]; then
            unzip -o $OUT/yazi.zip -d $OUT/
            mv $OUT/yazi*/yazi $OUT/yazi 2>/dev/null || mv $OUT/yazi-*/* $OUT/ 2>/dev/null || true
            rm -f $OUT/yazi.zip
            rm -rf $OUT/yazi-*
          fi

          echo "⬇️ zoxide..."
          ./eget ajeetdsouza/zoxide --system $TARGET --asset "musl" --asset "tar.gz" --to $OUT/

          echo "🔨 Building tmux..."
          apt-get update && apt-get install -y libevent-dev libncurses-dev bison pkg-config
          TMUX_VER=$(curl -s https://api.github.com/repos/tmux/tmux/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -fsSL "https://github.com/tmux/tmux/releases/download/v${TMUX_VER}/tmux-${TMUX_VER}.tar.gz" | tar xz
          cd "tmux-${TMUX_VER}"
          ./configure CFLAGS="-I$HOME/.local/include" LDFLAGS="-L$HOME/.local/lib"
          make -j$(nproc)
          mv tmux $OUT/
          cd .. && rm -rf "tmux-${TMUX_VER}"

          echo "🔨 Building tokei..."
          cargo install tokei --root $HOME/.local
          mv $HOME/.local/bin/tokei $OUT/

          echo "🔨 Building dotter..."
          cargo install dotter --root $HOME/.local
          mv $HOME/.local/bin/dotter $OUT/

          echo "📦 Installed tools:"
          ls -la $OUT/

          echo "📦 Compressing..."
          TAR_NAME="toolkit-${{ matrix.arch }}.tar.gz"
          tar -czvf $TAR_NAME -C $OUT .

          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-${{ matrix.arch }}
          path: ${{ env.TAR_NAME }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: Toolkit ${{ needs.prepare.outputs.tag_name }}
          files: dist/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
